name: Hugo Docker Image CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  # schedule:
  #   - cron: '0 3 * * *' # 每天构建一次（可选）
  # schedule:
  #   - cron: '0 3 * * 1' # 每周一构建一次 (例如，每周一凌晨3点)

# 明确设置权限，避免fork仓库的权限问题
permissions:
  contents: read
  packages: write  # 推送镜像到GitHub Container Registry所需权限
  security-events: write
  actions: read

env:
  DOCKER_REPO: bailangvvking/hugo
  IMAGE_NAME: hugo
  IMAGE_TAG: latest

# 控制并发，避免重复构建
concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: false  # 改为 false，允许并发

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on:
      - self-hosted
      - linux
      - x64
    # 增加超时时间（自托管运行器适配）
    timeout-minutes: 120  # 2小时足够，无需24小时
    # 自动重试配置（与runs-on同级，缩进正确）
    retry:
      maxAttempts: 3  # 总计运行3次（初始1次+重试2次）
      when:
        - jobStatus == 'failure'
        - jobStatus == 'cancelled'
        - jobStatus == 'timed_out'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Set up QEMU（关键！多架构构建依赖）
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true  # 确保Buildx正确安装

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # 登录失败时重试
        continue-on-error: false

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .  # 恢复上下文，否则Buildx找不到Dockerfile
          file: ./Dockerfile
          platforms: |
              linux/386
              linux/amd64
              linux/arm/v6
              linux/arm/v7
              linux/arm64/v8
              linux/ppc64le
              linux/riscv64
              linux/s390x
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}:${{ env.IMAGE_TAG }}
          cache: false  # 禁用缓存确保纯净构建

      - name: Output image info
        run: |
          echo "✅ Image built and pushed successfully"
          echo "Repository: ${{ env.DOCKER_REPO }}"
          echo "Tag: ${{ env.IMAGE_TAG }}"
          # 验证镜像是否存在
          docker pull ${{ env.DOCKER_REPO }}:${{ env.IMAGE_TAG }} || echo "⚠️ Image pull check failed (may be delayed)"

      - name: Scan image for vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REPO }}:${{ env.IMAGE_TAG }}  # 修正镜像名
          format: 'sarif'
          output: 'trivy-results.sarif'
          skip-db-update: false
          skip-java-db-update: false
        # 扫描失败不阻断流程（非核心步骤）
        continue-on-error: true

      - name: Upload Trivy scan results
        if: github.event_name != 'pull_request' && github.event_name != 'schedule'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'container-vulnerability-scan'
        continue-on-error: true

      - name: Notify build failure（可选：失败通知）
        if: failure()
        run: |
          echo "❌ Build/push failed after ${{ job.retry_attempts }} attempts"
          # 可添加钉钉/企业微信/邮件通知逻辑
